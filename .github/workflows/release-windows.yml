name: Release Windows Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: 24
  PNPM_VERSION: 10

jobs:
  build-electron:
    name: Electron (${{ matrix.arch }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            archFlag: --x64
          - arch: x86
            archFlag: --ia32
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm build

      - name: Build Electron
        run: pnpm exec electron-builder --win --publish never ${{ matrix.archFlag }}

      - name: Upload Electron artifact
        uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.arch }}
          path: release/electron/*.zip
          retention-days: 1

  build-tauri:
    name: Tauri (${{ matrix.arch }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            target: x86_64-pc-windows-msvc
          - arch: x86
            target: i686-pc-windows-msvc
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync Tauri version
        run: node scripts/sync-version.js

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - name: Build Tauri
        run: pnpm exec tauri build --target ${{ matrix.target }}

      - name: Package Tauri bundle
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          $bundleDir = "src-tauri/target/${{ matrix.target }}/release/bundle"
          $zipName = "jiujing-tauri-$version-windows-${{ matrix.arch }}.zip"
          if (Test-Path $bundleDir) {
            Compress-Archive -Path "$bundleDir/*" -DestinationPath $zipName
          }

      - name: Upload Tauri artifact
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.arch }}
          path: jiujing-tauri-*.zip
          retention-days: 1

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs:
      - build-electron
      - build-tauri
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true
