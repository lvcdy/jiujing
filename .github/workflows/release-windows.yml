name: Release Windows Apps

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-electron:
    name: Electron (${{ matrix.arch }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            archFlag: --x64
          - arch: x86
            archFlag: --ia32
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Electron
        run: pnpm electron:build -- ${{ matrix.archFlag }}

      - name: Upload Electron artifact
        uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.arch }}
          path: release/electron/*.zip

  build-tauri:
    name: Tauri (${{ matrix.arch }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            target: x86_64-pc-windows-msvc
          - arch: x86
            target: i686-pc-windows-msvc
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync Tauri version
        run: node -e "const fs=require('fs'); const pkg=require('./package.json'); const path='src-tauri/tauri.conf.json'; const conf=JSON.parse(fs.readFileSync(path,'utf8')); conf.package.version=pkg.version; fs.writeFileSync(path, JSON.stringify(conf, null, 2));"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Tauri
        run: pnpm tauri:build -- --target ${{ matrix.target }}

      - name: Package Tauri bundle
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          $bundleDir = "src-tauri/target/${{ matrix.target }}/release/bundle"
          $zipName = "jiujing-tauri-$version-windows-${{ matrix.arch }}.zip"
          Compress-Archive -Path "$bundleDir/*" -DestinationPath $zipName

      - name: Upload Tauri artifact
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.arch }}
          path: jiujing-tauri-*.zip

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs:
      - build-electron
      - build-tauri
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
