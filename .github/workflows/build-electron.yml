name: Build Electron App
on:
  push:
    tags:
      - v*
  workflow_dispatch:
permissions:
  contents: write
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: 24
  PNPM_VERSION: 10
jobs:
  build:
    name: Electron (${{ matrix.arch }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            archFlag: --x64
          - arch: x86
            archFlag: --ia32
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm exec electron-builder --win --publish never ${{ matrix.archFlag }}
      - uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.arch }}
          path: release/electron/*.zip
          retention-days: 1
